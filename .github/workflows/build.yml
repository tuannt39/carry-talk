name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  MACOS_MIN_VERSION: '13.0'

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: amd64
            target: x86_64-unknown-linux-gnu
            artifact_name: carry-talk-linux-amd64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
            artifact_name: carry-talk-linux-arm64
          - os: windows-latest
            platform: windows
            arch: amd64
            target: x86_64-pc-windows-msvc
            artifact_name: carry-talk-windows-amd64
          - os: windows-11-arm
            platform: windows
            arch: arm64
            target: aarch64-pc-windows-msvc
            artifact_name: carry-talk-windows-arm64
          - os: macos-15-intel
            platform: macos
            arch: intel
            target: x86_64-apple-darwin
            artifact_name: carry-talk-macos-intel
          - os: macos-15
            platform: macos
            arch: silicon
            target: aarch64-apple-darwin
            artifact_name: carry-talk-macos-silicon

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Node.js LTS
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libpulse-dev \
            patchelf \
            fakeroot \
            rpm

      - name: Build Tauri app (macOS)
        if: matrix.platform == 'macos'
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ env.MACOS_MIN_VERSION }}
        run: npm run tauri -- build --target ${{ matrix.target }}

      - name: Build Tauri app
        if: matrix.platform != 'macos'
        run: npm run tauri -- build --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/**
          if-no-files-found: error
